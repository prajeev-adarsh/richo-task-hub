<!DOCTYPE html>
<html lang="en">
  <head>

    <link rel="canonical" href="https://richo.lovable.app/" />
    <meta name="google-site-verification" content="J3edLECN6A3MZN1jSA5ETh_O5UFwZZNgIe5oEhWIjCc" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00b8d9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Richo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Richo" />
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />

    <style>
      body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif}
      #root{min-height:100vh;width:100%}
      .initial-loader{min-height:100vh;display:flex;align-items:center;justify-content:center;background:hsl(217 33% 97%)}
      @media(prefers-color-scheme:dark){.initial-loader{background:hsl(240 10% 3.9%)}}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>

    <meta property="og:title" content="Richo — The AI Freelance Marketplace" />
    <meta property="og:description" content="Hire vetted Prompt Engineers, Vibe Coders, AI Automation Experts and AI Video Editors. The future of work is here." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://richo.lovable.app/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@richo_ai" />
    <meta name="twitter:title" content="Richo — The AI Freelance Marketplace" />
    <meta name="twitter:description" content="Hire vetted AI freelancers or get hired on Richo." />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Richo",
      "url": "https://richo.lovable.app/",
      "description": "AI freelance marketplace connecting clients with vetted AI experts.",
      "sameAs": ["https://twitter.com/richo_ai"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Richo",
      "url": "https://richo.lovable.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://richo.lovable.app/browse-tasks?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
